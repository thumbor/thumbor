name: lint/formatter
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - master

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # 26.5.1
        with:
          options: "--check --verbose"
  flake8:
    permissions:
      contents: read # to fetch code (actions/checkout)
      checks: write # to update checks

    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: actions/checkout@v6
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        uses: suo/flake8-github-action@3e87882219642e01aa8a6bbd03b4b0adb8542c2a # v1 release
        with:
          checkName: "flake8"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  isort:
    runs-on: ubuntu-latest
    env:
      UV_PROJECT_ENVIRONMENT: .uv-venv
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.19"
      - name: Install test dependencies
        run: uv sync --locked --extra tests
      - name: Run isort
        run: uv run isort thumbor tests --profile black --check-only --diff
